name: Build and Push Apps

on:
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - '.github/workflows/build-apps.yml'

  workflow_dispatch:

jobs:
  dockerhub:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    environment: DEV-PREG

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        service: [baby, memo, nutri, org, pills, care]

    env:
      DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
      APP_DIR: apps/preg-${{ matrix.service }}-app
      APP_NAME: preg-${{ matrix.service }}-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect whether app changed
        id: changed
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet "${{ github.event.before }}" "${{ github.sha }}" -- "${{ env.APP_DIR }}"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify Dockerfile exists
        if: steps.changed.outputs.changed == 'true'
        run: test -f "${{ env.APP_DIR }}/Dockerfile"

      - name: Set up Docker Buildx
        if: steps.changed.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.changed.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image to Docker Hub
        if: steps.changed.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_DIR }}
          file: ${{ env.APP_DIR }}/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.APP_NAME }}:latest

  ecr:
    name: Push to Amazon ECR
    runs-on: ubuntu-latest
    environment: DEV-PREG
    if: github.event_name == 'workflow_dispatch'

    permissions:
      id-token: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        service: [baby, memo, nutri, org, pills, care]

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      ECR_REPO: ${{ vars.ECR_REPO }}
      APP_DIR: apps/preg-${{ matrix.service }}-app
      APP_NAME: preg-${{ matrix.service }}-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set short SHA
        id: vars
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Verify Dockerfile exists
        run: test -f "${{ env.APP_DIR }}/Dockerfile"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/gha-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image to ECR
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_DIR }}
          file: ${{ env.APP_DIR }}/Dockerfile
          push: true
          tags: |
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:${{ env.APP_NAME }}-latest
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:${{ env.APP_NAME }}-${{ env.SHORT_SHA }}